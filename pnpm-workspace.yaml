packages:
  - "apps/*"
  - "packages/*"
  - "packages-rust/*"
  # NOTE: per-platform napi subpackages under `packages-rust/*/npm/*` are
  # intentionally NOT workspace members. Parent crates reference them via
  # `link:./npm/<triple>` so the lockfile resolves locally (avoiding the
  # chicken-and-egg with unpublished versions) without exposing them to
  # changesets, which can't ignore a dependency of a non-ignored package.
  # `napi pre-publish` rewrites parent's optionalDependencies to concrete
  # versions at publish time.

catalog:
  "@biomejs/biome": ^2.4.15
  "@vitest/coverage-v8": ^4.1.7
  "@napi-rs/cli": "^3.6.2"
  tsup: ^8.5.0
  typescript: ^6.0.3
  valibot: ^1.4.1
  vitest: ^4.1.7

allowBuilds:
  esbuild: true

# Supply-chain hardening: Do not install deps younger then 5 days (7200 minutes).
# IMPORTANT: WHEN UPDATING UPDATE dependabot.yml AS WELL
minimumReleaseAge: 7200

minimumReleaseAgeExclude:
  - valibot@1.4.1
  # All internal packages (main + napi platform subpackages) are published
  # from this repo and not subject to the external-dep cool-off. Without
  # this, the 5-day window blocks freshly-bumped subpackages from entering
  # pnpm-lock.yaml and CI's frozen install errors. Glob form added in
  # pnpm 10.16; we're on 11.3.
  - "@noem/*"
