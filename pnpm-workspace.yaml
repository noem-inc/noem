packages:
  - "apps/*"
  - "packages/*"
  - "packages-rust/*"

catalog:
  "@biomejs/biome": ^2.4.15
  "@vitest/coverage-v8": ^4.1.7
  "@napi-rs/cli": "^3.6.2"
  tsup: ^8.5.0
  typescript: ^6.0.3
  valibot: ^1.4.1
  vitest: ^4.1.7

allowBuilds:
  esbuild: true

# Supply-chain hardening: Do not install deps younger then 5 days (7200 minutes).
minimumReleaseAge: 7200

minimumReleaseAgeExclude:
  - valibot@1.4.1
