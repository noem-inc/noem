name: CI

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `changeset status` can diff against the base branch.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

      # Fail the PR if no changeset was added. Skipped for the auto-generated
      # "Version Packages" PR, which consumes changesets and has none by design.
      - name: Require a changeset
        if: github.head_ref != 'changeset-release/main'
        run: pnpm changeset status --since=origin/${{ github.base_ref }}
