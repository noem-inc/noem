name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Primary validate job which runs on mac since its the fastest.
  # The platform specific jobs only need to run the tests
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Ensure cargo is on PATH for the napi (Rust) build. llvm-tools-preview
      # required by cargo-llvm-cov.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285 # v2.79.13
        with:
          tool: cargo-llvm-cov

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

  # Linux build + tests.
  validate-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Ensure cargo is on PATH for the napi (Rust) build. llvm-tools-preview
      # required by cargo-llvm-cov.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285 # v2.79.13
        with:
          tool: cargo-llvm-cov

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

  # Windows build + tests.
  validate-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Ensure cargo is on PATH for the napi (Rust) build. llvm-tools-preview
      # required by cargo-llvm-cov.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285 # v2.79.13
        with:
          tool: cargo-llvm-cov

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

  # PR hygiene: require a changeset.
  changeset:
    # Skipped for the auto-generated "Version Packages" PR, which consumes
    # changesets and has none by design.
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so `changeset status` can diff against the base branch.
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm changeset status --since=origin/${{ github.base_ref }}
