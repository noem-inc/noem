name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build + test across all three OSes. Lint runs only on the mac leg (the
  # fastest runner) since lint output is platform-independent.
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            lint: true
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Ensure cargo is on PATH for the napi (Rust) build. llvm-tools-preview
      # required by cargo-llvm-cov.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285 # v2.79.13
        with:
          tool: cargo-llvm-cov

      - run: pnpm install --frozen-lockfile

      - if: matrix.lint
        run: pnpm lint

      - run: pnpm test

      - run: pnpm build

  # PR hygiene: require a changeset.
  changeset:
    # Skipped for the auto-generated "Version Packages" PR, which consumes
    # changesets and has none by design.
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so `changeset status` can diff against the base branch.
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm changeset status --since=origin/${{ github.base_ref }}
