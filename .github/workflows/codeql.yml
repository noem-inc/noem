name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Catches advisories that land between commits. Runs Monday 05:30 UTC,
    # offset from the OpenSSF Scorecard schedule (04:30)
    - cron: "30 5 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runs-on }}
    permissions:
      # Required to upload SARIF results to the Security tab.
      security-events: write
      # Required for `github/codeql-action/init` to read action metadata
      # on private repos. Harmless on public.
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            # `none` skips the build phase — CodeQL extracts TS/JS directly
            # from source. Faster and avoids needing pnpm install.
            build-mode: none
            runs-on: ubuntu-latest
          - language: rust
            # Rust extractor (GA Apr 2024) needs a real build. `manual` lets
            # us run cargo build with the same toolchain pin used by CI so
            # the analysis sees identical generated code.
            build-mode: manual
            runs-on: ubuntu-latest

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Rust-only setup: toolchain + pnpm + node so the workspace build
      # below can resolve napi and produce real cargo invocations for the
      # CodeQL extractor to trace.
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - if: matrix.language == 'rust'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - if: matrix.language == 'rust'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - if: matrix.language == 'rust'
        run: pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # `security-extended` adds higher-precision queries beyond the
          # default set; `security-and-quality` would also flag style issues
          # which we don't want gating PRs.
          queries: security-extended

      # Manual build for Rust. Drives every crate under packages-rust/ via
      # the workspace's build pipeline so new crates are picked up
      # automatically — no per-crate edits to this workflow. napi build
      # invokes cargo under the hood, which the CodeQL extractor traces.
      - if: matrix.language == 'rust'
        run: pnpm exec turbo run build --filter='./packages-rust/*'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
