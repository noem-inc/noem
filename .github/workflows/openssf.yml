name: OpenSSF Security Pipeline

on:
  # For Scorecard, it's recommended to run on a schedule and on pushes to the main branch
  schedule:
    - cron: "30 4 * * 1" # Runs every Monday at 4:30 AM UTC
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions; jobs override only what they need.
permissions:
  contents: read

jobs:
  # 1. Dependency Review Job (Runs only on Pull Requests)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fails the PR if critical or high vulnerabilities are introduced
          severity-threshold: high

  # 2. OpenSSF Scorecard Job
  scorecard-analysis:
    name: OpenSSF Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed to upload the results to GitHub's code scanning dashboard
      security-events: write
      # Needed to publish results to the public OpenSSF Scorecard API (optional but recommended for OSS)
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes results to the public Scorecard REST API.
          # Set to false if your repository is PRIVATE.
          publish_results: true

      # Upload the results to GitHub's Security tab
      - name: Upload SARIF Results
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif
