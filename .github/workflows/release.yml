name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Minimal default permissions; jobs override only what they need.
permissions:
  contents: read

jobs:
  # Stage A: maintain the "Version Packages" PR. When that PR merges, all
  # .changeset/*.md are consumed → hasChangesets == "false" → Stages B/C fire.
  # Also detects which packages-rust/* crates were actually bumped and emits
  # the per-target build matrix.
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      changedPackages: ${{ steps.matrix.outputs.changedPackages }}
      nativeChanged: ${{ steps.matrix.outputs.nativeChanged }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # HEAD~1 needed to diff the merge commit and see which package.json
          # versions were bumped.
          fetch-depth: 2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Opens / updates the Version Packages PR. We intentionally do NOT pass
      # `publish:` — publishing happens in the matrixed jobs below so each
      # platform binary builds on its native runner.
      - id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Discovers packages-rust/<pkg> whose version was bumped, expands their
      # napi.targets into matrix entries, maps triple → runner.
      - id: matrix
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: node scripts/release-matrix.mts

  # Stage B: build a .node per (package, target) on its native runner.
  # Matrix is fully data-driven from packages-rust/<pkg>/package.json napi
  # config — no hardcoded package names.
  build:
    needs: version
    if: needs.version.outputs.hasChangesets == 'false' && needs.version.outputs.nativeChanged == 'true'
    # Build only reads code (checkout) + runs cargo/pnpm/upload-artifact —
    # no GitHub API writes. upload-artifact uses Actions internal storage.
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJson(needs.version.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages-rust/${{ matrix.pkg }}
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      # napi invoked directly (not via the package's `build:ci` script) so we
      # don't depend on pnpm's script-runner shell. pnpm spawns the script via
      # cmd.exe on Windows even when the parent step runs in bash, which
      # leaves `$TARGET` literally unexpanded. Calling napi here keeps the
      # variable substitution in GitHub's templating.
      - name: Build ${{ matrix.pkg }} for ${{ matrix.target }}
        shell: bash
        working-directory: packages-rust/${{ matrix.pkg }}
        run: |
          pnpm exec napi build --platform --release --target ${{ matrix.target }} -o dist --js index.cjs --dts index.d.cts
          pnpm exec napi build --platform --release --esm --target ${{ matrix.target }} -o dist --js index.js --dts index.d.ts

      - name: Upload .node binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.pkg }}-${{ matrix.target }}
          path: packages-rust/${{ matrix.pkg }}/dist/*.node
          if-no-files-found: error

      # One matrix entry per package is flagged jsLoader; that job uploads the
      # shared JS wrapper / .d.ts that napi build emits (identical across all
      # targets for a given package).
      - name: Upload JS loader (once per package)
        if: matrix.jsLoader
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: js-loader-${{ matrix.pkg }}
          path: |
            packages-rust/${{ matrix.pkg }}/dist/index.js
            packages-rust/${{ matrix.pkg }}/dist/index.cjs
            packages-rust/${{ matrix.pkg }}/dist/index.d.ts
            packages-rust/${{ matrix.pkg }}/dist/index.d.cts
          if-no-files-found: error

  # Stage C: assemble artifacts per changed crate, publish per-platform
  # subpackages via `napi pre-publish`, then `changeset publish` for the
  # main packages (native + pure-JS siblings).
  publish:
    needs: [version, build]
    # `always() && ...` so this still runs when `build` was SKIPPED — that's
    # the case for releases that only bump JS-only packages. Without
    # always(), GitHub treats the skip as a propagated skip.
    if: |
      always() &&
      needs.version.outputs.hasChangesets == 'false' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # `napi pre-publish` rewrites parent `optionalDependencies` from
      # `link:./npm/<triple>` to concrete `<version>` so the published main
      # package pins its native sub-pkgs. That mutation makes pnpm's
      # auto-recheck flag the lockfile as out-of-date on every subsequent
      # `pnpm exec` (Build JS-only, Publish via Changesets). The strict
      # `pnpm install --frozen-lockfile` above already validated state.
      #
      # pnpm v11 loads `verifyDepsBeforeRun` ONLY from pnpm-workspace.yaml —
      # `npm_config_verify_deps_before_run` is silently ignored. Append it
      # ephemerally to the runner's working copy (never committed).
      - name: Disable pnpm deps recheck for rest of job
        run: |
          echo "verifyDepsBeforeRun: false" >> pnpm-workspace.yaml

      # Steps below gated on nativeChanged — when only JS siblings were
      # bumped, no .node binaries were built and napi pre-publish would 403
      # on duplicate native subpackage versions.
      - name: Download all .node bindings
        if: needs.version.outputs.nativeChanged == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: bindings-*
          # No merge-multiple: each artifact lands in its own subdir, so we
          # can dispatch per-package below.

      - name: Download all JS loaders
        if: needs.version.outputs.nativeChanged == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: js-loaders
          pattern: js-loader-*

      # Move each downloaded artifact into the right package directory so
      # `napi artifacts` / `napi pre-publish` see them.
      - name: Distribute artifacts to packages
        if: needs.version.outputs.nativeChanged == 'true'
        run: |
          for pkg in $(echo '${{ needs.version.outputs.changedPackages }}' | jq -r '.[]'); do
            echo "::group::Distribute artifacts for $pkg"
            mkdir -p "packages-rust/$pkg/artifacts"
            # Flatten all bindings-<pkg>-<target>/ subdirs into the package's
            # artifacts/ — napi artifacts will sort them into npm/<triple>/.
            for dir in artifacts/bindings-"$pkg"-*; do
              [ -d "$dir" ] && cp -r "$dir"/. "packages-rust/$pkg/artifacts/"
            done
            # JS loader / .d.ts go straight into the package's dist/.
            if [ -d "js-loaders/js-loader-$pkg" ]; then
              cp -r "js-loaders/js-loader-$pkg"/. "packages-rust/$pkg/dist/"
            fi
            echo "::endgroup::"
          done

      # For each changed crate: wire .node files into npm/<triple>/, run
      # napi pre-publish for manifest mutations only, then publish each
      # subpackage ourselves with tolerance for "version already exists" —
      # required when re-running a workflow that partially published before
      # failing downstream (e.g. failed JS-only build strands the parent).
      # Auth via OIDC.
      - name: Publish per-platform subpackages
        if: needs.version.outputs.nativeChanged == 'true'
        run: |
          set -euo pipefail
          for pkg in $(echo '${{ needs.version.outputs.changedPackages }}' | jq -r '.[]'); do
            echo "::group::Publish native subpackages for $pkg"
            pushd "packages-rust/$pkg" > /dev/null
            pnpm exec napi artifacts --output-dir artifacts
            # `--no-gh-release` because GitHub releases are handled by
            # changesets/action elsewhere. Default behaviour scans HEAD's
            # commit message for the package name to attach assets to a
            # release, which fails for recovery commits ("Recover stranded
            # napi sub-packages in release matrix" etc.) that don't name a
            # specific package.
            #
            # `--skip-optional-publish` runs only the manifest mutations
            # (subpackage version sync + parent optionalDependencies pin)
            # and skips the `npm publish` loop — we replace it below with
            # one that tolerates duplicate-version errors.
            pnpm exec napi pre-publish --no-gh-release --skip-optional-publish

            # Per-platform subpackage publish with idempotent re-run support.
            # Subpackages carry their own publishConfig.provenance:true, so
            # OIDC provenance attaches without an explicit --provenance flag.
            for npm_dir in npm/*/; do
              [ -d "$npm_dir" ] || continue
              sub_name=$(jq -r .name "$npm_dir/package.json")
              sub_ver=$(jq -r .version "$npm_dir/package.json")
              echo "→ publishing $sub_name@$sub_ver"
              if npm publish "$npm_dir" 2> >(tee /tmp/npm-publish.err >&2); then
                echo "✓ published $sub_name@$sub_ver"
              elif grep -qiE 'EPUBLISHCONFLICT|cannot publish over|previously published' /tmp/npm-publish.err; then
                echo "⊘ skip $sub_name@$sub_ver — already on registry"
              else
                echo "✗ publish failed for $sub_name@$sub_ver" >&2
                exit 1
              fi
            done

            popd > /dev/null
            echo "::endgroup::"
          done

      # Build pure-JS packages (luhn, encryption, ...) so changeset publish
      # has fresh dist/ for each. Excludes everything under packages-rust/
      # because those crates can't compile on Linux and their dist/ JS loader
      # is already in place from the distribute-artifacts step (when included).
      - name: Build JS-only packages
        run: pnpm exec turbo run build --filter='./packages/*'

      # Publishes every workspace package whose version is newer than npm —
      # native crates plus any pure-JS siblings bumped by this release.
      # Unchanged packages are no-ops.
      - name: Publish via Changesets
        run: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
