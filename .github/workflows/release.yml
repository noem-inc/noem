name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # OIDC trusted publishing needs npm >= 11.5.1; Node 24 bundles 11.3.0.
      - run: npm install -g npm@latest

      # Opens/updates a "Version Packages" PR; publishes to npm when that PR merges.
      # No NODE_AUTH_TOKEN: publish authenticates via OIDC trusted publishing (id-token).
      - uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
