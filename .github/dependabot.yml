version: 2
updates:
  # Keep GitHub Actions SHAs (pinned per OpenSSF Scorecard Pinned-Dependencies)
  # fresh. Grouped into a single weekly PR to avoid per-action churn.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # npm / pnpm workspace. Dependabot scans every package.json under the
  # workspace and bumps catalog: entries in pnpm-workspace.yaml directly.
  # One grouped PR per week keeps reviewer load bounded.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Mirrors pnpm-workspace.yaml's `minimumReleaseAge: 7200` (5 days).
    # Without this, Dependabot tries to bump to a fresh release and pnpm
    # install fails because the version is younger than the cool-off
    # window — surfaced as `unknown_error` in the Dependabot logs with
    # no actionable detail.
    # IMPORTANT: WHEN UPDATING UPDATE pnpm-workspace.yml AS WELL
    cooldown:
      default-days: 5
    groups:
      npm:
        patterns: ["*"]
        # Major bumps split into their own PRs so breaking changes stay
        # reviewable in isolation.
        update-types: ["minor", "patch"]

  # Rust crates for the napi addon. Cargo.toml + Cargo.lock under each
  # packages-rust/<crate>/ — currently just platform-keystore.
  - package-ecosystem: cargo
    directory: /packages-rust/platform-keystore
    schedule:
      interval: weekly
    # Cargo doesn't enforce a minimum release age, but matching the npm
    # cool-off keeps the supply-chain posture consistent and dodges
    # yanked-on-day-of-release scenarios.
    # IMPORTANT: WHEN UPDATING UPDATE pnpm-workspace.yml AS WELL
    cooldown:
      default-days: 5
    groups:
      cargo:
        patterns: ["*"]
        update-types: ["minor", "patch"]
