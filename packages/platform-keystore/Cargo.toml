[package]
name = "noem-platform-keystore"
version = "0.0.0"
edition = "2024"
description = "TPM-backed key storage via NCrypt Platform KSP"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi9", "serde-json"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
zeroize = { version = "1", features = ["derive"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.62", features = [
  "Win32_Security_Cryptography",
  "Win32_Foundation",
] }

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
