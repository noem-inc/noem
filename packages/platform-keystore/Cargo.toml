[package]
name = "noem-platform-keystore"
version = "0.0.0"
edition = "2024"
description = "TPM-backed hardware key storage — provision non-exportable keys and seal/unseal secrets via the Windows NCrypt Platform KSP"
license = "MIT"
keywords = ["tpm", "keystore", "ncrypt", "encryption", "napi"]
categories = ["cryptography", "os::windows-apis", "api-bindings"]

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
napi = { version = "3", features = ["napi9", "serde-json"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
zeroize = { version = "1", features = ["derive"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.62", features = [
  "Win32_Security_Cryptography",
  "Win32_System_TpmBaseServices",
  "Win32_Foundation",
] }

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"

[build-dependencies]
napi-build = "2"
